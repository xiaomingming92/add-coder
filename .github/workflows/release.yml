name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
  push:
    tags: ["v*"]

jobs:
  # workflow_dispatch 一站式：bump version → commit → tag → publish → release
  bump-and-publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install
      - run: pnpm build
      - run: pnpm lint --max-warnings 0

      - name: Collect changes since last tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --oneline --no-merges "$PREV_TAG..HEAD" | sed 's/^/- /' > /tmp/release-notes.txt
          else
            git log --oneline --no-merges | sed 's/^/- /' > /tmp/release-notes.txt
          fi
          echo "---" >> /tmp/release-notes.txt
          VER=$(node -p "require('./package.json').version")
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...v$VER" >> /tmp/release-notes.txt

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "v%s"
          git push
          git push --tags
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_COMMITTER_NAME: github-actions[bot]

      - run: pnpm publish --no-git-checks --tag latest

      - name: Create GitHub Release
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.txt
        env:
          GH_TOKEN: ${{ github.token }}

  # push tags 路径：本地手动打 tag 推送 / 同 tag 重新发布
  # bump-and-publish 已创建 release 时会自动跳过
  publish-only:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "⏭️  Release ${{ github.ref_name }} 已存在，跳过（由 bump-and-publish 创建）"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: pnpm/action-setup@v4
        if: steps.check.outputs.skipped != 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skipped != 'true'
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install
        if: steps.check.outputs.skipped != 'true'
      - run: pnpm build
        if: steps.check.outputs.skipped != 'true'
      - run: pnpm lint --max-warnings 0
        if: steps.check.outputs.skipped != 'true'

      - run: pnpm publish --no-git-checks --tag latest
        if: steps.check.outputs.skipped != 'true'

      - name: Collect changes since last tag
        if: steps.check.outputs.skipped != 'true'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}"~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --oneline --no-merges "$PREV_TAG..${{ github.ref_name }}" | sed 's/^/- /' > /tmp/release-notes.txt
          else
            git log --oneline --no-merges "${{ github.ref_name }}" | sed 's/^/- /' > /tmp/release-notes.txt
          fi
          echo "---" >> /tmp/release-notes.txt
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}" >> /tmp/release-notes.txt

      - name: Create GitHub Release
        if: steps.check.outputs.skipped != 'true'
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file /tmp/release-notes.txt
        env:
          GH_TOKEN: ${{ github.token }}
