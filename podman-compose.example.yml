# 复制为 podman-compose.yml（或 docker-compose.yml）后修改
# 凭据不写在这里，统一在 .env.development 中维护：
#   DATABASE_USER=<DATABASE_USER>
#   DATABASE_PASSWORD=<DATABASE_PASSWORD>
#   DATABASE_PORT=<DATABASE_PORT>
#   PROJECT_NAME=<PROJECT_NAME>

services:
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: ${PROJECT_NAME}-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DATABASE_PORT:-5433}:5432"
    volumes:
      - ./data/postgres/${PROJECT_NAME}:/var/lib/postgresql/data
    env_file:
      - .env.development
    environment:
      POSTGRES_USER: ${DATABASE_USER:-admin}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${PROJECT_NAME}
      TZ: "Asia/Shanghai"
    networks:
      - ${PROJECT_NAME}-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-admin} -d ${PROJECT_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ${PROJECT_NAME}-network:
    driver: bridge
